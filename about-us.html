<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About - Piyush Jain | Data Analyst & Full Stack Developer</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/iconoir@latest/css/iconoir.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./about-us.css" />

    <style>
      /* Copy all your existing styles here */
      body {
        overflow-y: auto;
        min-height: 100vh;
      }
      .main_container {
        min-height: 100vh;
        padding-bottom: 100px;
        overflow: visible;
      }
      .detail-modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(5px);
        overflow-y: auto;
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .detail-modal-content {
        background: linear-gradient(
          145deg,
          rgba(30, 30, 30, 1) 0%,
          rgba(15, 15, 15, 1) 50%,
          rgb(1, 1, 1) 100%
        );
        margin: 5% auto;
        padding: 40px;
        border-radius: 20px;
        width: 90%;
        max-width: 700px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        position: relative;
        animation: slideUp 0.4s ease;
        color: #fff;
      }
      @keyframes slideUp {
        from {
          transform: translateY(50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .detail-close {
        position: absolute;
        right: 25px;
        top: 25px;
        color: #aaa;
        font-size: 35px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .detail-close:hover {
        color: #fff;
        transform: rotate(90deg);
      }
      .expand-icon {
        cursor: pointer;
        width: 35px;
        height: 35px;
        transition: transform 0.3s ease;
        opacity: 0.7;
      }
      .expand-icon:hover {
        transform: scale(1.2) rotate(90deg);
        opacity: 1;
      }
      .experience li {
        position: relative;
        padding-right: 50px;
      }
      .experience li .expand-icon {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
      }
      .section1,
      .section2 {
        margin-bottom: 30px;
      }
      @media (max-width: 768px) {
        .detail-modal-content {
          width: 95%;
          padding: 25px;
          margin: 10% auto;
        }
      }
      .skill-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .skill-tag {
        background: rgba(91, 120, 246, 0.2);
        color: #5b78f6;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        border: 1px solid rgba(91, 120, 246, 0.3);
      }
      .scrollable {
        max-height: 300px; /* adjust height as needed */
        overflow-y: auto; /* enables vertical scroll */
        padding-right: 5px; /* optional for scrollbar spacing */
      }
      .scrollable::-webkit-scrollbar {
        width: 1px;
      }
      .scrollable::-webkit-scrollbar-thumb {
        background: #000;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <nav>
      <section class="logo">
        <img src="./assests/photo.jpeg" alt="Piyush Jain" />
      </section>
      <section class="nav-links">
        <a href="./index.html"><li>Home</li></a>
        <a href="./about-us.html"><li>About</li></a>
        <a href="./work.html"><li>Works</li></a>
        <a href="./Certificates.html"><li>Certificates</li></a>
        <a href="./Contactus.html"><li>Contact</li></a>
      </section>
      <section class="talk-btn">
        <a href="chatbot.html">CHATBOT</a>
      </section>
      <div class="hamburger">
        <i class="fas fa-bars"></i>
      </div>
    </nav>

    <main class="main_container">
      <!-- Content will be dynamically loaded -->
      <div id="dynamic-content"></div>
    </main>

    <script src="./data.json"></script>
    <script>
      let portfolioData = {};

      // Load JSON data
      async function loadData() {
        try {
          const response = await fetch("./data.json");
          portfolioData = await response.json();
          renderContent();
        } catch (error) {
          console.error("Error loading data:", error);
        }
      }

      // Render all content
      function renderContent() {
        const container = document.getElementById("dynamic-content");

        container.innerHTML = `
          <!-- Section 1: Profile Image & Summary -->
          <section class="section1">
            <div class="sub-section1_1 aboutImage">
              <div class="image">
                <img src="./assests/photo.jpeg" alt="${portfolioData.personal.name}" />
              </div>
            </div>
            <div class="sub-section1_2 summary">
              <div class="Self_summary">
                <img src="./assests/image.png" alt />
                <h1>SELF-SUMMARY</h1>
                <img src="./assests/image.png" alt />
              </div>
              <div class="sub-section3_2 box about_summary">
                <img decoding="async" src="https://wpriverthemes.com/gridx/wp-content/themes/gridx/assets/images/icon2.png" alt="Star" class="star-icon" />
                <div class="join_us_arrow">
                  <div class="join_us">
                    <h1>${portfolioData.summary.title}</h1>
                    <h1>${portfolioData.summary.description}</h1>
                  </div>
                  <div class="logo_section card-arrow">
                    <a href="./Contactus.html">
                      <img decoding="async" src="https://wpriverthemes.com/gridx/wp-content/themes/gridx/assets/images/icon.svg" alt="Star" />
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <!-- Section: Internships & Freelancing & Education -->
          <section class="section1">
            <div class="sub-section1_1 experience scrollable ">
              <h2>Internships</h2>
              <ul>
                ${portfolioData.internships
                  .map(
                    (intern) => `
                  <li>
                    <h3>${intern.period}</h3>
                    <h2>${intern.title}</h2>
                    <h3>${intern.company}</h3>
                    <img class="expand-icon" decoding="async" src="https://wpriverthemes.com/gridx/wp-content/themes/gridx/assets/images/icon.svg" alt="View Details" onclick="openDetailModal('${intern.id}')" />
                  </li>
                `,
                  )
                  .join("")}
              </ul>
            </div>

            <div class="sub-section1_1 experience scrollable">
              <h2>Freelancing</h2>
              <ul>
                ${portfolioData.freelancing
                  .map(
                    (freelance) => `
                  <li>
                    <h3>${freelance.period}</h3>
                    <h2>${freelance.title}</h2>
                    <h3>${freelance.client}</h3>
                    <img class="expand-icon" decoding="async" src="https://wpriverthemes.com/gridx/wp-content/themes/gridx/assets/images/icon.svg" alt="View Details" onclick="openDetailModal('${freelance.id}')" />
                  </li>
                `,
                  )
                  .join("")}
              </ul>
            </div>

            <div class="sub-section1_1 experience scrollable">
              <h2>Education</h2>
              <ul>
                ${portfolioData.education
                  .map(
                    (edu) => `
                  <li>
                    <h3>${edu.period}</h3>
                    <h2>${edu.degree}</h2>
                    <h3>${edu.institution} | ${edu.grade}</h3>
                    <img class="expand-icon" decoding="async" src="https://wpriverthemes.com/gridx/wp-content/themes/gridx/assets/images/icon.svg" alt="View Details" onclick="openDetailModal('${edu.id}')" />
                  </li>
                `,
                  )
                  .join("")}
              </ul>
            </div>
          </section>

          <!-- Technical Skills Section -->
          <section class="section1">
            <div class="sub-section1_1 experience scrollable">
              <h2>Data Analytics Skills</h2>
              <ul>
                ${portfolioData.skills.dataAnalytics
                  .map(
                    (skill, idx) => `
                  <li>
                    <h3>${skill.name}</h3>
                    <div class="skill-tags">
                      ${skill.tags.map((tag) => `<span class="skill-tag">${tag}</span>`).join("")}
                    </div>
                    <img class="expand-icon" decoding="async" src="https://wpriverthemes.com/gridx/wp-content/themes/gridx/assets/images/icon.svg" alt="View Details" onclick="openDetailModal('skillData${idx}')" />
                  </li>
                `,
                  )
                  .join("")}
              </ul>
            </div>

            <div class="sub-section1_1 experience scrollable">
              <h2>Development Skills</h2>
              <ul>
                ${portfolioData.skills.development
                  .map(
                    (skill, idx) => `
                  <li>
                    <h3>${skill.name}</h3>
                    <div class="skill-tags">
                      ${skill.tags.map((tag) => `<span class="skill-tag">${tag}</span>`).join("")}
                    </div>
                    <img class="expand-icon" decoding="async" src="https://wpriverthemes.com/gridx/wp-content/themes/gridx/assets/images/icon.svg" alt="View Details" onclick="openDetailModal('skillDev${idx}')" />
                  </li>
                `,
                  )
                  .join("")}
              </ul>
            </div>

            <div class="sub-section1_1 experience scrollable">
              <h2>Achievements & Certifications</h2>
              <ul>
                ${portfolioData.achievements
                  .map(
                    (ach) => `
                  <li>
                    <h3>${ach.category}</h3>
                    <p>${ach.details.join(" | ")}</p>
                  </li>
                `,
                  )
                  .join("")}
              </ul>
            </div>
          </section>

          <!-- Social & Contact Section -->
          <section class="section2">
            <div class="sub-section2_3 box">
              <div class="social-icon">
                <a href="${portfolioData.personal.github}" target="_blank" title="GitHub"><i class="fa-brands fa-github"></i></a>
                <a href="${portfolioData.personal.linkedin}" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
                <a href="${portfolioData.personal.hackerrank}" target="_blank" title="HackerRank"><i class="fa-brands fa-hackerrank"></i></a>
                <a href="${portfolioData.personal.instagram}" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
              </div>
              <div class="logo_section">
                <div class="deatails-credenatild">
                  <h6>CONNECT WITH ME</h6>
                  <h4>SOCIAL PROFILES</h4>
                </div>
                <a href="./Contactus.html">
                  <img decoding="async" src="https://wpriverthemes.com/gridx/wp-content/themes/gridx/assets/images/icon.svg" alt="Star" />
                </a>
              </div>
            </div>
            <div class="sub-section3_2 box">
              <img decoding="async" src="https://wpriverthemes.com/gridx/wp-content/themes/gridx/assets/images/icon2.png" alt="Star" class="star-icon" />
              <div class="join_us_arrow">
                <div class="join_us">
                  <h1>Let's</h1>
                  <h1>work <span>together</span></h1>
                  <p class="text-sm text-gray-400 mt-2">${portfolioData.personal.email}</p>
                </div>
                <div class="logo_section card-arrow">
                  <a href="./Contactus.html">
                    <img decoding="async" src="https://wpriverthemes.com/gridx/wp-content/themes/gridx/assets/images/icon.svg" alt="Star" />
                  </a>
                </div>
              </div>
            </div>
            <div class="credentails credentails_about">
              <div class="image-credentails">
                <img src="https://www.nicepng.com/png/full/433-4335396_rain-png.png" alt="Resume" />
              </div>
              <div class="logo_section">
                <div class="deatails-credenatild">
                  <h6>DOWNLOAD MY</h6>
                  <h4>RESUME</h4>
                </div>
                <a href="./assests/resume.pdf" download>
                  <img decoding="async" src="https://wpriverthemes.com/gridx/wp-content/themes/gridx/assets/images/icon.svg" alt="Star" />
                </a>
              </div>
            </div>
          </section>
        `;

        // Create modals dynamically
        createModals();
      }

      // Create all modals dynamically from JSON
      function createModals() {
        // Create Internship Modals
        portfolioData.internships.forEach((intern) => {
          createModal(
            intern.id,
            `
            <h3>${intern.period} · ${intern.duration}</h3>
            <h2>${intern.title}</h2>
            <h3>${intern.company}</h3>
            <p>${intern.description}</p>
            <p><strong>Key Responsibilities:</strong></p>
            <ul style="color: #aaa; line-height: 1.8">
              ${intern.responsibilities.map((r) => `<li>${r}</li>`).join("")}
            </ul>
            ${
              intern.achievements
                ? `
              <p><strong>Achievements:</strong></p>
              <ul style="color: #aaa; line-height: 1.8">
                ${intern.achievements.map((a) => `<li>${a}</li>`).join("")}
              </ul>
            `
                : ""
            }
          `,
          );
        });

        // Create Freelance Modals
        portfolioData.freelancing.forEach((freelance) => {
          createModal(
            freelance.id,
            `
            <h3>${freelance.period}</h3>
            <h2>${freelance.title}</h2>
            <h3>${freelance.client}</h3>
            <p>${freelance.description}</p>
            <p><strong>Technologies:</strong> ${freelance.technologies.join(", ")}</p>
            <p><strong>Key Features:</strong></p>
            <ul style="color: #aaa; line-height: 1.8">
              ${freelance.features.map((f) => `<li>${f}</li>`).join("")}
            </ul>
            ${
              freelance.achievements
                ? `
              <p><strong>Achievements:</strong></p>
              <ul style="color: #aaa; line-height: 1.8">
                ${freelance.achievements.map((a) => `<li>${a}</li>`).join("")}
              </ul>
            `
                : ""
            }
          `,
          );
        });

        // Create Education Modals
        portfolioData.education.forEach((edu) => {
          createModal(
            edu.id,
            `
            <h3>${edu.period}</h3>
            <h2>${edu.degree}</h2>
            <h3>${edu.institution} | ${edu.grade}</h3>
            ${edu.stream ? `<p><strong>Stream:</strong> ${edu.stream}</p>` : ""}
            ${
              edu.coursework
                ? `
              <p><strong>Relevant Coursework:</strong> ${edu.coursework.join(", ")}</p>
            `
                : ""
            }
            ${edu.projects ? `<p><strong>Projects Completed:</strong> ${edu.projects}</p>` : ""}
          `,
          );
        });

        // Create Skill Modals
        portfolioData.skills.dataAnalytics.forEach((skill, idx) => {
          createModal(
            `skillData${idx}`,
            `
            <h2>${skill.name}</h2>
            <p><strong>Core Competencies:</strong></p>
            <ul style="color: #aaa; line-height: 1.8">
              <li>${skill.details}</li>
            </ul>
            ${
              skill.certifications
                ? `
              <p><strong>Certifications:</strong> ${skill.certifications.join(", ")}</p>
            `
                : ""
            }
          `,
          );
        });

        portfolioData.skills.development.forEach((skill, idx) => {
          createModal(
            `skillDev${idx}`,
            `
            <h2>${skill.name}</h2>
            <p><strong>Technologies:</strong> ${skill.tags.join(", ")}</p>
            <p><strong>Key Skills:</strong> ${skill.details}</p>
            ${
              skill.certifications
                ? `
              <p><strong>Certifications:</strong> ${skill.certifications.join(", ")}</p>
            `
                : ""
            }
          `,
          );
        });
      }

      // Helper function to create modal
      function createModal(id, content) {
        if (document.getElementById(id)) return;

        const modal = document.createElement("div");
        modal.id = id;
        modal.className = "detail-modal";
        modal.innerHTML = `
          <div class="detail-modal-content">
            <span class="detail-close" onclick="closeDetailModal('${id}')">&times;</span>
            ${content}
          </div>
        `;
        document.body.appendChild(modal);
      }

      // Modal functions
      function openDetailModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) {
          modal.style.display = "block";
          document.body.style.overflow = "hidden";
        }
      }

      function closeDetailModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) {
          modal.style.display = "none";
          document.body.style.overflow = "auto";
        }
      }

      window.onclick = function (event) {
        if (event.target.classList.contains("detail-modal")) {
          event.target.style.display = "none";
          document.body.style.overflow = "auto";
        }
      };

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
          const modals = document.querySelectorAll(".detail-modal");
          modals.forEach((modal) => {
            modal.style.display = "none";
          });
          document.body.style.overflow = "auto";
        }
      });

      // Make functions globally available
      window.openDetailModal = openDetailModal;
      window.closeDetailModal = closeDetailModal;

      // Load data on page load
      loadData();
    </script>
    <script src="./script.js"></script>
  </body>
</html>
