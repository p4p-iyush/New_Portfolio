    <style>
      /* Additional styles for category sections */
      .category-section {
        margin-bottom: 60px;
      }

      .category-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 30px;
        padding-bottom: 15px;
        border-bottom: 2px solid rgba(91, 120, 246, 0.3);
      }

      .category-title {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .category-title h2 {
        font-size: 1.8rem;
        font-weight: 600;
        color: #fff;
        margin: 0;
      }

      .category-title .category-icon {
        font-size: 2rem;
        color: #5b78f6;
      }

      .category-count {
        background: rgba(91, 120, 246, 0.2);
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        color: #5b78f6;
        border: 1px solid rgba(91, 120, 246, 0.3);
      }

      .project-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 25px;
      }

     x */

      .Self_summary {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        /* margin-bottom: 50px; */
      }

      .Self_summary img {
        width: 40px;
        height: 40px;
        opacity: 0.6;
      }

      .Self_summary h1 {
        font-size: 2rem;
        color: #fff;
        /* letter-spacing: 2px; */
      }

      .word_card {
        background: linear-gradient(
          145deg,
          rgba(30, 30, 30, 1) 0%,
          rgba(20, 20, 20, 1) 100%
        );
        border-radius: 15px;
        overflow: hidden;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* .word_card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        border-color: rgba(91, 120, 246, 0.5);
      } */

      .work_image {
        width: 100%;
        height: 220px;
        overflow: hidden;
      }

      .work_image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease;
      }

      .word_card:hover  {
        transform: scale(1.05);
      }

      .work_details {
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .work_title {
        font-size: 1.1rem;
        font-weight: 500;
        color: #fff;
      }

      .work_arrow {
        width: 35px;
        height: 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        /* background: rgba(91, 120, 246, 0.1); */
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      /* .work_arrow:hover {
        background: #5b78f6;
        transform: rotate(45deg);
      } */

      .work_arrow img {
        width: 20px;
        height: 20px;
      }

      /* Modal Styles */
      .project-modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(5px);
      }

      .modal-content {
        background: linear-gradient(
          145deg,
          rgba(30, 30, 30, 1) 0%,
          rgba(15, 15, 15, 1) 100%
        );
        margin: 5% auto;
        padding: 0;
        border-radius: 20px;
        width: 90%;
        max-width: 800px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        animation: slideUp 0.4s ease;
      }

      @keyframes slideUp {
        from {
          transform: translateY(50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .close-modal {
        position: absolute;
        right: 25px;
        top: 20px;
        color: #fff;
        font-size: 35px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        z-index: 10;
      }

      .close-modal:hover {
        color: #5b78f6;
        transform: rotate(90deg);
      }

      .modal-header {
        position: relative;
        height: 250px;
        overflow: hidden;
        border-radius: 20px 20px 0 0;
      }

      .modal-header img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .modal-header h2 {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
        padding: 30px 20px 20px;
        margin: 0;
        color: #fff;
        font-size: 1.5rem;
      }

      .modal-body {
        padding: 25px;
      }

      .modal-body p {
        color: #aaa;
        line-height: 1.8;
        margin-bottom: 20px;
      }

      .tech-stack {
        margin-bottom: 20px;
      }

      .tech-stack h3 {
        color: #5b78f6;
        font-size: 0.9rem;
        margin-bottom: 10px;
      }

      .tech-stack ul {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        list-style: none;
        padding: 0;
      }

      .tech-stack ul li {
        background: rgba(91, 120, 246, 0.1);
        color: #5b78f6;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        border: 1px solid rgba(91, 120, 246, 0.3);
      }

      .features-list {
        margin-bottom: 20px;
      }

      .features-list h3 {
        color: #5b78f6;
        font-size: 0.9rem;
        margin-bottom: 10px;
      }

      .features-list ul {
        list-style: none;
        padding: 0;
      }

      .features-list ul li {
        color: #aaa;
        padding: 5px 0;
        padding-left: 20px;
        position: relative;
      }

      .features-list ul li:before {
        content: "▹";
        position: absolute;
        left: 0;
        color: #5b78f6;
      }

      .project-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 15px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        margin-top: 15px;
      }

      .project-meta p {
        margin: 0;
        color: #888;
        font-size: 0.85rem;
      }

      .project-meta a {
        background: #5b78f6;
        color: #fff;
        padding: 8px 20px;
        border-radius: 25px;
        text-decoration: none;
        font-size: 0.85rem;
        transition: all 0.3s ease;
      }

      .project-meta a:hover {
        background: #4a65e0;
        transform: translateY(-2px);
      }

      @media (max-width: 768px) {
        .project-grid {
          grid-template-columns: 1fr;
        }
        .category-title h2 {
          font-size: 1.3rem;
        }
        .Self_summary h1 {
          font-size: 1.8rem;
        }
        .modal-content {
          margin: 10% auto;
          width: 95%;
        }
        .modal-header {
          height: 180px;
        }
      }
    </style>

        <h1>MY PROJECTS</h1>

    <!-- Project Modal -->
    <div class="project-modal" id="projectModal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div class="modal-header">
          <img id="modalProjectImage" src="" alt="Project Image" />
          <h2 id="modalProjectTitle"></h2>
        </div>
        <div class="modal-body">
          <p id="modalProjectDescription"></p>
          <div class="tech-stack">
            <h3>📚 Technologies Used</h3>
            <ul id="modalProjectTechnologies"></ul>
          </div>
          <div class="features-list">
            <h3>✨ Key Features</h3>
            <ul id="modalProjectFeatures"></ul>
          </div>
          <div class="project-meta">
            <p>📅 <span id="modalProjectDate"></span></p>
            <div>
              <a
                id="modalProjectGithub"
                href="#"
                target="_blank"
                style="margin-right: 10px"
                >🐙 GitHub</a
              >
              <a id="modalProjectLive" href="#" target="_blank">🔗 Live Demo</a>
            </div>
          </div>
        </div>
      </div>

    <script>
      // Category configuration with icons
      const categories = {
        dataAnalytics: {
          name: "Data Analytics Projects",
          icon: "fa-solid fa-chart-line",
          color: "#5b78f6",
        },
        fullStack: {
          name: "Full Stack Development",
          icon: "fa-solid fa-code",
          color: "#5b78f6",
        },
        college: {
          name: "College Projects",
          icon: "fa-solid fa-graduation-cap",
          color: "#5b78f6",
        },
        freelancing: {
          name: "Freelancing Projects",
          icon: "fa-solid fa-briefcase",
          color: "#5b78f6",
        },
        internship: {
          name: "Internship Projects",
          icon: "fa-solid fa-building",
          color: "#5b78f6",
        },
        personal: {
          name: "Personal Projects",
          icon: "fa-solid fa-user",
          color: "#5b78f6",
        },
        cloud: {
          name: "Cloud & AWS Projects",
          icon: "fa-solid fa-cloud",
          color: "#5b78f6",
        },
      };

      // Map project categories to display categories
      const categoryMapping = {
        "Data Analytics": "dataAnalytics",
        "College Project": "college",
        Freelancing: "freelancing",
        Internship: "internship",
        "Personal Project": "personal",
        "AWS Training": "cloud",
        "Full Stack Development": "fullStack",
      };

      let allProjects = [];

      // Fetch projects from JSON file
      async function loadProjects() {
        try {
          const response = await fetch("./projects.json");
          const data = await response.json();
          allProjects = data.projects;
          renderProjectsByCategory(allProjects);
        } catch (error) {
          console.error("Error loading projects:", error);
          document.getElementById("projects-container").innerHTML = `
            <div style="text-align: center; color: #fff; padding: 50px;">
              <i class="fa-solid fa-circle-exclamation" style="font-size: 48px; color: #5b78f6;"></i>
              <p style="margin-top: 20px;">Unable to load projects. Please check the JSON file.</p>
            </div>
          `;
        }
      }

      // Group projects by category
      function groupProjectsByCategory(projects) {
        const grouped = {};

        projects.forEach((project) => {
          let categoryKey = categoryMapping[project.category] || "fullStack";
          if (!grouped[categoryKey]) {
            grouped[categoryKey] = [];
          }
          grouped[categoryKey].push(project);
        });

        return grouped;
      }

      // Render projects with categories
      function renderProjectsByCategory(projects) {
        const grouped = groupProjectsByCategory(projects);
        const container = document.getElementById("projects-container");
        container.innerHTML = "";

        // Define order of categories
        const categoryOrder = [
          "dataAnalytics",
          "fullStack",
          "college",
          "freelancing",
          "internship",
          "personal",
          "cloud",
        ];

        categoryOrder.forEach((categoryKey) => {
          const categoryProjects = grouped[categoryKey];
          if (categoryProjects && categoryProjects.length > 0) {
            const categoryInfo = categories[categoryKey];

            // Create category section
            const section = document.createElement("div");
            section.className = "category-section";
            section.innerHTML = `
              <div class="category-header">
                <div class="category-title">
                    <div class="Self_summary">
        <img src="./assests/image.png" alt="" />
        <h1> ${categoryInfo.name}</h1>
        <img src="./assests/image.png" alt="" />
      </div>
                  <h2></h2>
                </div>
                <span class="category-count">${categoryProjects.length} Projects</span>
              </div>
              <div class="project-grid" id="grid-${categoryKey}"></div>
            `;
            container.appendChild(section);

            // Add projects to grid
            const grid = section.querySelector(`#grid-${categoryKey}`);
            categoryProjects.forEach((project, index) => {
              const projectCard = createProjectCard(
                project,
                `${categoryKey}-${index}`,
              );
              grid.appendChild(projectCard);
            });
          }
        });

        // Add event listeners for modal
        attachModalListeners();
      }

      // Create individual project card
      function createProjectCard(project, uniqueId) {
        const card = document.createElement("div");
        card.className = "word_card";
        card.setAttribute("data-project-id", uniqueId);
        card.setAttribute("data-project-index", allProjects.indexOf(project));

        card.innerHTML = `
          <div class="work_image">
            <img src="${project.image}" alt="${project.title}">
          </div>
          <div class="work_details">
            <div class="work_title">${project.title}</div>
            <div class="work_arrow">
              <img src="https://wpriverthemes.com/gridx/wp-content/themes/gridx/assets/images/icon.svg" alt="View Details">
            </div>
          </div>
        `;

        // Add click event to card
        card.addEventListener("click", (e) => {
          if (!e.target.closest(".work_arrow")) {
            openModal(project);
          }
        });

        // Add click event to arrow
        const arrow = card.querySelector(".work_arrow");
        arrow.addEventListener("click", (e) => {
          e.stopPropagation();
          openModal(project);
        });

        return card;
      }

      // Open modal with project details
      function openModal(project) {
        const modal = document.getElementById("projectModal");

        document.getElementById("modalProjectImage").src = project.image;
        document.getElementById("modalProjectTitle").textContent =
          project.title;
        document.getElementById("modalProjectDescription").textContent =
          project.description;
        document.getElementById("modalProjectDate").textContent = project.date;

        // Set GitHub link
        const githubLink = document.getElementById("modalProjectGithub");
        if (project.github && project.github !== "") {
          githubLink.href = project.github;
          githubLink.style.display = "inline-block";
        } else {
          githubLink.style.display = "none";
        }

        // Set Live Demo link
        const liveLink = document.getElementById("modalProjectLive");
        if (project.live && project.live !== "") {
          liveLink.href = project.live;
          liveLink.style.display = "inline-block";
        } else {
          liveLink.style.display = "none";
        }

        // Add technologies
        const techList = document.getElementById("modalProjectTechnologies");
        techList.innerHTML = "";
        project.technologies.forEach((tech) => {
          const li = document.createElement("li");
          li.textContent = tech;
          techList.appendChild(li);
        });

        // Add features if available
        const featuresList = document.getElementById("modalProjectFeatures");
        if (project.features && project.features.length > 0) {
          featuresList.innerHTML = "";
          project.features.forEach((feature) => {
            const li = document.createElement("li");
            li.textContent = feature;
            featuresList.appendChild(li);
          });
          featuresList.parentElement.style.display = "block";
        } else {
          featuresList.parentElement.style.display = "none";
        }

        modal.style.display = "block";
        document.body.style.overflow = "hidden";
      }

      // Close modal
      function closeModal() {
        const modal = document.getElementById("projectModal");
        modal.style.display = "none";
        document.body.style.overflow = "auto";
      }

      // Attach modal close listeners
      function attachModalListeners() {
        const modal = document.getElementById("projectModal");
        const closeBtn = document.querySelector(".close-modal");

        closeBtn.onclick = closeModal;

        window.onclick = function (event) {
          if (event.target === modal) {
            closeModal();
          }
        };

        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape" && modal.style.display === "block") {
            closeModal();
          }
        });
      }

      // Load projects on page load
      document.addEventListener("DOMContentLoaded", loadProjects);
    </script>
    <script src="./script.js"></script>
  </body>
