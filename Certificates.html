<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificates - Piyush Jain</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/iconoir@latest/css/iconoir.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="work.css" />
    <link rel="stylesheet" href="./about-us.css" />

    <style>
      /* Certificate Page Styles */
      .certificates-main {
        max-width: 1400px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      .Self_summary {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-bottom: 50px;
      }

      .Self_summary img {
        width: 40px;
        height: 40px;
        opacity: 0.6;
      }

      .Self_summary h1 {
        font-size: 2rem;
        color: #fff;
      }

      /* Category Section */
      .category-section {
        margin-bottom: 60px;
      }

      .category-header {
        margin-bottom: 30px;
      }

      .project-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 25px;
      }

      /* Certificate Card */
      .certificate-card {
        background: linear-gradient(
          145deg,
          rgba(30, 30, 30, 1) 0%,
          rgba(20, 20, 20, 1) 100%
        );
        border-radius: 15px;
        overflow: hidden;
        transition: all 0.3s ease;
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.1);
        position: relative;
      }

      .certificate-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        border-color: rgba(91, 120, 246, 0.5);
      }

      .certificate-image {
        width: 100%;
        height: 200px;
        overflow: hidden;
        background: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .certificate-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease;
      }

      .certificate-card:hover .certificate-image img {
        transform: scale(1.05);
      }

      .certificate-info {
        padding: 20px;
      }

      .certificate-title {
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
        margin-bottom: 8px;
        line-height: 1.4;
      }

      .certificate-issuer {
        font-size: 0.85rem;
        color: #5b78f6;
        margin-bottom: 5px;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .certificate-issuer i {
        font-size: 0.75rem;
      }

      .certificate-date {
        font-size: 0.75rem;
        color: #888;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .certificate-date i {
        font-size: 0.7rem;
      }

      .view-badge {
        position: absolute;
        bottom: 15px;
        right: 15px;
        width: 35px;
        height: 35px;
        background: rgba(91, 120, 246, 0.9);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: all 0.3s ease;
      }

      .certificate-card:hover .view-badge {
        opacity: 1;
      }

      .view-badge i {
        color: #fff;
        font-size: 1rem;
      }

      /* Modal Styles */
      .certificate-modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(8px);
      }

      .modal-content {
        background: linear-gradient(
          145deg,
          rgba(30, 30, 30, 1) 0%,
          rgba(15, 15, 15, 1) 100%
        );
        margin: 3% auto;
        padding: 0;
        border-radius: 20px;
        width: 90%;
        max-width: 700px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        animation: slideUp 0.4s ease;
      }

      @keyframes slideUp {
        from {
          transform: translateY(50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .close-modal {
        position: absolute;
        right: 25px;
        top: 20px;
        color: #fff;
        font-size: 35px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        z-index: 10;
      }

      .close-modal:hover {
        color: #5b78f6;
        transform: rotate(90deg);
      }

      .modal-header {
        position: relative;
        height: 300px;
        overflow: hidden;
        border-radius: 20px 20px 0 0;
        background: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-header img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      .modal-header h2 {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
        padding: 30px 20px 20px;
        margin: 0;
        color: #fff;
        font-size: 1.3rem;
      }

      .modal-body {
        padding: 25px;
      }

      .certificate-details {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 20px;
      }

      .detail-item {
        flex: 1;
        min-width: 150px;
      }

      .detail-item h4 {
        color: #5b78f6;
        font-size: 0.8rem;
        margin-bottom: 5px;
      }

      .detail-item p {
        color: #fff;
        font-size: 0.9rem;
        margin: 0;
      }

      .modal-actions {
        display: flex;
        gap: 15px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .modal-actions a {
        flex: 1;
        text-align: center;
        background: #5b78f6;
        color: #fff;
        padding: 10px 20px;
        border-radius: 25px;
        text-decoration: none;
        font-size: 0.85rem;
        transition: all 0.3s ease;
      }

      .modal-actions a:hover {
        background: #4a65e0;
        transform: translateY(-2px);
      }

      .modal-actions a:first-child {
        background: rgba(91, 120, 246, 0.2);
        border: 1px solid rgba(91, 120, 246, 0.5);
      }

      .modal-actions a:first-child:hover {
        background: rgba(91, 120, 246, 0.3);
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        color: #fff;
        padding: 60px;
      }

      .empty-state i {
        font-size: 48px;
        color: #5b78f6;
        margin-bottom: 20px;
      }

      /* Responsive */
      @media (max-width: 1200px) {
        .project-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      @media (max-width: 900px) {
        .project-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 600px) {
        .project-grid {
          grid-template-columns: 1fr;
        }
        .Self_summary h1 {
          font-size: 1.5rem;
        }
        .modal-header {
          height: 220px;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <section class="logo">
        <img src="./assests/photo.jpeg" alt="Piyush Jain" />
      </section>

      <section class="nav-links">
        <a href="./index.html"><li>Home</li></a>
        <a href="./about-us.html"><li>About</li></a>
        <a href="./work.html"><li>Works</li></a>
        <a href="./Certificates.html"><li>Certificates</li></a>
        <a href="./Contactus.html"><li>Contact</li></a>
      </section>

      <section class="talk-btn">
        <a href="chatbot.html">CHATBOT</a>
      </section>

      <div class="hamburger">
        <i class="fas fa-bars"></i>
      </div>
    </nav>

    <main class="certificates-main">
      <div class="Self_summary">
        <img src="./assests/image.png" alt="" />
        <h1>MY CERTIFICATIONS</h1>
        <img src="./assests/image.png" alt="" />
      </div>

      <div id="certificates-container"></div>
    </main>

    <!-- Certificate Modal -->
    <div class="certificate-modal" id="certificateModal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div class="modal-header">
          <img id="modalCertImage" src="" alt="Certificate" />
          <h2 id="modalCertTitle"></h2>
        </div>
        <div class="modal-body">
          <div class="certificate-details">
            <div class="detail-item">
              <h4>ISSUED BY</h4>
              <p id="modalCertIssuer"></p>
            </div>
            <div class="detail-item">
              <h4>ISSUED DATE</h4>
              <p id="modalCertDate"></p>
            </div>
            <div class="detail-item">
              <h4>CATEGORY</h4>
              <p id="modalCertCategory"></p>
            </div>
          </div>
          <div class="modal-actions">
            <a id="modalCertDownload" href="#" download>📥 Download Certificate</a>
            <a id="modalCertVerify" href="#" target="_blank">🔗 Verify Online</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Category configuration with icons
      const categories = {
        programming: {
          name: "Programming Languages",
          icon: "fa-solid fa-code",
          color: "#5b78f6",
          order: 1
        },
        webDevelopment: {
          name: "Web Development",
          icon: "fa-solid fa-globe",
          color: "#5b78f6",
          order: 2
        },
        database: {
          name: "Database & SQL",
          icon: "fa-solid fa-database",
          color: "#5b78f6",
          order: 3
        },
        networking: {
          name: "Networking",
          icon: "fa-solid fa-network-wired",
          color: "#5b78f6",
          order: 4
        },
        security: {
          name: "Cyber Security",
          icon: "fa-solid fa-shield-haltered",
          color: "#5b78f6",
          order: 5
        },
        ai: {
          name: "Artificial Intelligence",
          icon: "fa-solid fa-brain",
          color: "#5b78f6",
          order: 6
        },
        dataAnalytics: {
          name: "Data Analytics",
          icon: "fa-solid fa-chart-line",
          color: "#5b78f6",
          order: 7
        },
        professional: {
          name: "Professional Development",
          icon: "fa-solid fa-briefcase",
          color: "#5b78f6",
          order: 8
        }
      };

      // Map certificate categories
      const categoryMapping = {
        "programming": "programming",
        "web-development": "webDevelopment",
        "database": "database",
        "networking": "networking",
        "security": "security",
        "ai": "ai",
        "data-analytics": "dataAnalytics",
        "professional": "professional"
      };

      let allCertificates = [];

      // Fetch certificates from JSON
      async function loadCertificates() {
        try {
          const response = await fetch("./certificates.json");
          const data = await response.json();
          allCertificates = data.certificates;
          renderCertificatesByCategory(allCertificates);
        } catch (error) {
          console.error("Error loading certificates:", error);
          document.getElementById("certificates-container").innerHTML = `
            <div class="empty-state">
              <i class="fa-solid fa-circle-exclamation"></i>
              <p>Unable to load certificates. Please check the JSON file.</p>
            </div>
          `;
        }
      }

      // Group certificates by category
      function groupCertificatesByCategory(certificates) {
        const grouped = {};
        
        certificates.forEach(cert => {
          let categoryKey = categoryMapping[cert.category] || "programming";
          if (!grouped[categoryKey]) {
            grouped[categoryKey] = [];
          }
          grouped[categoryKey].push(cert);
        });
        
        return grouped;
      }

      // Render certificates
      function renderCertificatesByCategory(certificates) {
        const grouped = groupCertificatesByCategory(certificates);
        const container = document.getElementById("certificates-container");
        container.innerHTML = "";
        
        // Sort categories by order
        const sortedCategories = Object.keys(categories).sort((a, b) => 
          categories[a].order - categories[b].order
        );
        
        sortedCategories.forEach(categoryKey => {
          const categoryCerts = grouped[categoryKey];
          if (categoryCerts && categoryCerts.length > 0) {
            const categoryInfo = categories[categoryKey];
            
            const section = document.createElement("div");
            section.className = "category-section";
            section.innerHTML = `
              <div class="category-header">
                <div class="Self_summary" style="justify-content: flex-start; gap: 15px; margin-bottom: 20px;">
                  <i class="${categoryInfo.icon}" style="font-size: 2rem; color: ${categoryInfo.color};"></i>
                  <h1 style="font-size: 1.5rem; margin: 0;">${categoryInfo.name}</h1>
                  <span class="category-count" style="background: rgba(91,120,246,0.2); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem;">
                    ${categoryCerts.length}
                  </span>
                </div>
              </div>
              <div class="project-grid" id="grid-${categoryKey}"></div>
            `;
            container.appendChild(section);
            
            const grid = section.querySelector(`#grid-${categoryKey}`);
            categoryCerts.forEach((cert, index) => {
              const certCard = createCertificateCard(cert, `${categoryKey}-${index}`);
              grid.appendChild(certCard);
            });
          }
        });
        
        attachModalListeners();
      }

      // Create certificate card
      function createCertificateCard(cert, uniqueId) {
        const card = document.createElement("div");
        card.className = "certificate-card";
        card.setAttribute("data-cert-id", uniqueId);
        card.setAttribute("data-cert-index", allCertificates.indexOf(cert));
        
        // Format date
        const dateObj = new Date(cert.date);
        const formattedDate = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
        
        card.innerHTML = `
          <div class="certificate-image">
            <img src="${cert.image}" alt="${cert.title}" onerror="this.src='https://via.placeholder.com/300x200?text=Certificate'">
          </div>
          <div class="certificate-info">
            <div class="certificate-title">${cert.title}</div>
            <div class="certificate-issuer">
              <i class="fa-solid fa-building"></i> ${cert.issuer}
            </div>
            <div class="certificate-date">
              <i class="fa-regular fa-calendar"></i> ${formattedDate}
            </div>
          </div>
          <div class="view-badge">
            <i class="fa-regular fa-eye"></i>
          </div>
        `;
        
        card.addEventListener("click", () => openModal(cert));
        
        return card;
      }

      // Get category display name
      function getCategoryDisplayName(categoryKey) {
        const mapping = {
          "programming": "Programming",
          "web-development": "Web Development",
          "database": "Database",
          "networking": "Networking",
          "security": "Cyber Security",
          "ai": "Artificial Intelligence",
          "data-analytics": "Data Analytics",
          "professional": "Professional Development"
        };
        return mapping[categoryKey] || categoryKey;
      }

      // Open modal
      function openModal(cert) {
        const modal = document.getElementById("certificateModal");
        const dateObj = new Date(cert.date);
        const formattedDate = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        
        document.getElementById("modalCertImage").src = cert.image;
        document.getElementById("modalCertTitle").textContent = cert.title;
        document.getElementById("modalCertIssuer").textContent = cert.issuer;
        document.getElementById("modalCertDate").textContent = formattedDate;
        document.getElementById("modalCertCategory").textContent = getCategoryDisplayName(cert.category);
        
        // Set download link
        const downloadLink = document.getElementById("modalCertDownload");
        downloadLink.href = cert.image;
        
        // Set verify link
        const verifyLink = document.getElementById("modalCertVerify");
        if (cert.link && cert.link !== "") {
          verifyLink.href = cert.link;
          verifyLink.style.display = "inline-block";
        } else {
          verifyLink.style.display = "none";
        }
        
        modal.style.display = "block";
        document.body.style.overflow = "hidden";
      }

      // Close modal
      function closeModal() {
        const modal = document.getElementById("certificateModal");
        modal.style.display = "none";
        document.body.style.overflow = "auto";
      }

      // Attach modal listeners
      function attachModalListeners() {
        const modal = document.getElementById("certificateModal");
        const closeBtn = document.querySelector(".close-modal");
        
        closeBtn.onclick = closeModal;
        
        window.onclick = function(event) {
          if (event.target === modal) {
            closeModal();
          }
        };
        
        document.addEventListener("keydown", function(event) {
          if (event.key === "Escape" && modal.style.display === "block") {
            closeModal();
          }
        });
      }

      // Load certificates on page load
      document.addEventListener("DOMContentLoaded", loadCertificates);
    </script>
    <script src="./script.js"></script>
  </body>
</html>
